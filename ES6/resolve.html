<body>
  <script>
    function getData () {
      return new Promise(function (resolve, reject) {
        let req = new XMLHttpRequest()
        req.open("get", "data.txt")
        req.onload = function () {
          resolve(this.responseText)
        }
        req.send()
      })
    }
    let dataPromise = getData()
    alert(dataPromise)
    alert("Hello")

    // })
    alert('World')

  </script>
</body>
