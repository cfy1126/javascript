<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Document</title>
  <script src="https://cdn.staticfile.org/react/18.2.0/umd/react.development.min.js"></script>
  <script src="https://cdn.staticfile.org/react-dom/18.2.0/umd/react-dom.development.min.js"></script>
  <script src="https://cdn.staticfile.org/babel-standalone/7.21.4/babel.min.js"></script>
  <style type="text/css">
    .switch {
      width: 60px;
      height: 30px;
      background-color: #ddd;
      border-radius: 15px;
    }

    .switch>.btn {
      width: 30px;
      height: 30px;
      background-color: #444;
      border-radius: 15px;
    }

    .switch-on>.btn {
      background-color: #448844;
      margin-left: 30px;
    }
  </style>
</head>

<body>
  <div id="switch-0"></div><br />
  <div id="switch-1"></div>
  <script type="text/babel">
    class Switch extends React.Component {
      constructor(props) {
        super(props)
        this.state = {
          switch: false
        }
      }
      update (e) {
        this.setState((currentState) => {
          return { switch: !currentState.switch }
        })
      }
      render () {
        let className
        if (this.state.switch) {
          className += " switch switch-on"
        } else {
          className = "switch"
        }

        return (
          <div className={className} onClick={this.update.bind(this)}>
            <div className="btn"></div>
          </div>
        )
      }
    }
    window.addEventListener('load', () => {
      // 1. 建立自订的 React 组件实体，给定属性
      let myComponent = <Switch />
      // 2. 将建立好的 React 组件实体渲染到容器中
      const root0 = ReactDOM.createRoot(document.getElementById('switch-0'))
      const root1 = ReactDOM.createRoot(document.getElementById('switch-1'))

      root0.render(myComponent)
      root1.render(myComponent)
    });
  </script>
</body>

</html>
