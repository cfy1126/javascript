<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <script src="https://cdn.staticfile.org/react/18.2.0/umd/react.development.min.js"></script>
  <script src="https://cdn.staticfile.org/react-dom/18.2.0/umd/react-dom.development.min.js"></script>
  <script src="https://cdn.staticfile.org/babel-standalone/7.21.4/babel.min.js"></script>
  <style type="text/css">
    .head {
      color: red;
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="text/babel">
    class MyHead extends React.Component {
      render () {
        // return React.createElement("div", { className: "head", style: { color: this.props.color } }, "Hello World" + this.props.level)
        return <div className="head" style={{ "color": this.props.color }}>hello,world{this.props.level}</div>
      }
    }

    class MyHeadList extends React.Component {
      render () {
        return (<div>
          <MyHead level='1' color="skyblue" />
          <MyHead level='2' />
          <MyHead level='3' />
        </div>)
      }
    }
    window.addEventListener("load", () => {
      // 1. 建立自订的 React 组件实体，给定属性
      let myComponent = <MyHeadList />
      // 2. 将建立好的 React 组件实体渲染到容器中
      const root = ReactDOM.createRoot(document.getElementById("root"))
      root.render(myComponent)
    })

  </script>
</body>

</html>
