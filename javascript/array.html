<body>
  <script>
    // 建立阵列物件
    let grades=[]
    grades.push(100)
    grades.push(92)
    grades.push(73)
    // console.log(grades);
    // console.log(grades[0]);
    // console.log(grades[1]);
    // console.log(grades.length);
    // 利用 for 循环，逐一取得阵列中的资料
    let total=0
    for(let i=0;i<grades.length;i++){
      total+=grades[i]
      console.log(grades[i]);
    }
    let average = total/grades.length
    console.log(average);
  </script>
