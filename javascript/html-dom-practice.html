  <div class="head">
    <span onmouseover="about()">关于我</span>
    <span onmouseover="learn()">学经历</span>
  </div>
  <hr />
  <div id="about">关于我</div>
  <div style="display:none" id="learn">学经历</div>
  <script>
    function about () {
      let elementAbout = document.querySelector("#about")
      let elementLearn = document.querySelector("#learn")
      elementAbout.style.display = "block"
      elementLearn.style.display = "none"

      // element.innerHTML="关于我"
    }
    function learn () {
      let elementAbout = document.querySelector("#about")
      let elementLearn = document.querySelector("#learn")
      elementAbout.style.display = "none"
      elementLearn.style.display = "block"
    }
  </script>
