  <script>

    /*

    // continue 指令
    for(let n=0;n<5;n++){
      if(n%2==0){ // n%2==0 为偶数
        continue //强迫回到循环上方，忽略下面指令，进入洗一次循环
      }
      console.log(n);
    }
  </script>
