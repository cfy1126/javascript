<body>
  <script>
    // if 判断式的基本语法
    let money = prompt("要领多少钱", "")
    if (money < 100) {
      console.log("太少了")
    } else if (money <= 100000) {
      console.log("ok")
    } else {
      console.log("输入金额不支持")
    }
    console.log("outside");
  </script>
</body>
