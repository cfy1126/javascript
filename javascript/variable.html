<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <script>
    // 宣告变量：let 
    let x;
    console.log(x);
    x=10; //把资料放进变量中：宣告过的变量名称=资料
    console.log(x);
    x=null
    console.log(x);
    let abc="Hello"
    console.log(abc);

    // 常数
    const z=100
    console.log(z);
    // z=true //错误，不能更新常数里面的资料
  </script>
</body>
</html>
